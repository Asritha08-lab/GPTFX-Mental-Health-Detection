{% extends 'layout.html' %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h2 class="text-2xl font-bold mb-4">New Mental Health Assessment</h2>
    <form method="POST" class="bg-white p-6 rounded shadow">
        <label class="block mb-2 font-semibold">Share how you are feeling (Social media post/Diary entry):</label>
        <textarea name="content" class="w-full border p-2 rounded h-32 mb-4" placeholder="Type here..."></textarea>
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">Analyze with GPTFX</button>
    </form>

    {% if analysis %}
    <div class="mt-8 bg-blue-50 p-6 rounded border-l-4 border-blue-600">
        <h3 class="font-bold text-xl mb-2">Analysis Result: {{ analysis.label }}</h3>
        <p class="text-sm text-gray-600 mb-4">Confidence Score: {{ (analysis.confidence * 100)|round(2) }}%</p>
        <hr class="mb-4">
        <h4 class="font-semibold text-blue-800">Native Explanation:</h4>
        <p class="italic text-gray-700">"{{ analysis.explanation }}"</p>
    </div>
    {% endif %}
</div>
{% endblock %}
