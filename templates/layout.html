<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPTFX - Mental Health Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <nav class="bg-blue-600 p-4 text-white flex justify-between">
        <h1 class="font-bold text-xl">GPTFX Dashboard</h1>
        <div>
            {% if session.user_id %}
                <a href="/dashboard" class="px-3">Home</a>
                <a href="/reports" class="px-3">Reports</a>
                <a href="/logout" class="px-3 text-red-200">Logout</a>
            {% else %}
                <a href="/login" class="px-3">Login</a>
                <a href="/register" class="px-3">Register</a>
            {% endif %}
        </div>
    </nav>
    <div class="container mx-auto mt-10 p-5">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
