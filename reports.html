{% extends 'layout.html' %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <h2 class="text-2xl font-bold mb-6 text-center">Your Mental Wellness Trends</h2>
    <div id="plot-area" class="bg-white p-6 rounded shadow">
        {% if plot %}
            <div id="chart"></div>
            <script>
                var graphs = {{ plot | safe }};
                Plotly.newPlot('chart', graphs.data, graphs.layout);
            </script>
        {% else %}
            <p class="text-center text-gray-500">No data available. Complete your first assessment on the dashboard!</p>
        {% endif %}
    </div>
</div>
{% endblock %}
