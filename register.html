{% extends 'layout.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded shadow-lg">
    <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Create GPTFX Account</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="bg-red-100 text-red-700 p-2 rounded mb-4 text-sm">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
            <input type="text" name="username" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
            <input type="password" name="password" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition duration-200">
            Register
        </button>
    </form>
    <p class="mt-4 text-center text-sm">
        Already have an account? <a href="/login" class="text-blue-600 hover:underline">Login here</a>
    </p>
</div>
{% endblock %}
